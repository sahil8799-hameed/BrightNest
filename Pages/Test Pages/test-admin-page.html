<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Admin Panel</title>

<style>
/* ===== Body & Layout ===== */
body{
  font-family: 'Arial', sans-serif;
  background:#ffffff;
  color:#333;
  padding:20px;
  margin:0;
}

h1{
  text-align:center;
  color:#b71c1c; /* dark red */
  margin-bottom:30px;
}

.container{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap:20px;
}

/* ===== Card Design ===== */
.card{
  background:#fff;
  border-left:5px solid #b71c1c;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
}

.card:hover{
  transform: translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card h3{
  color:#b71c1c;
  margin-bottom:10px;
}

.card p{
  margin:6px 0;
  font-size:0.95rem;
}

/* ===== Media (Image / PDF) ===== */
img, .pdfThumb{
  width:100%;
  max-width:200px;
  border-radius:6px;
  margin-top:10px;
  cursor:pointer;
  object-fit:cover;
  display:block;
  transition: transform 0.2s;
}

img:hover, .pdfThumb:hover{
  transform: scale(1.05);
}

/* ===== Delete Button ===== */
.deleteBtn{
  margin-top:15px;
  padding:10px 18px;
  background:#b71c1c;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition: 0.2s;
}

.deleteBtn:hover{
  background:#7f0000;
}

/* ===== Modal ===== */
#viewerModal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#viewerContent{
  max-width:90%;
  max-height:90%;
}

#viewerModal img, #viewerModal iframe{
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:10px;
}

#closeViewer{
  position:absolute;
  top:20px;
  right:30px;
  font-size:35px;
  color:white;
  cursor:pointer;
  font-weight:bold;
  user-select:none;
}
</style>
</head>

<body>

<h1>Teacher Admin Dashboard</h1>

<div class="container" id="submissionsContainer"></div>

<!-- MODAL -->
<div id="viewerModal">
  <span id="closeViewer">&times;</span>
  <div id="viewerContent"></div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIC_F-CicoOReHOS0_2E479xNO99oxuYY",
  authDomain: "brightnest-8f214.firebaseapp.com",
  databaseURL: "https://brightnest-8f214-default-rtdb.firebaseio.com",
  projectId: "brightnest-8f214",
  storageBucket: "brightnest-8f214.firebasestorage.app",
  messagingSenderId: "73934228297",
  appId: "1:73934228297:web:a36c6cb93407d38c376898"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("submissionsContainer");
const submissionsRef = ref(db,"studentSubmissions");

const viewerModal = document.getElementById("viewerModal");
const viewerContent = document.getElementById("viewerContent");
const closeViewer = document.getElementById("closeViewer");

// Close modal
closeViewer.onclick = () => { viewerModal.style.display = "none"; viewerContent.innerHTML=""; }
viewerModal.onclick = (e) => { if(e.target==viewerModal) { viewerModal.style.display="none"; viewerContent.innerHTML=""; } }

onValue(submissionsRef, (snapshot) => {
  container.innerHTML = "";

  snapshot.forEach(child => {
    const data = child.val();
    const card = document.createElement("div");
    card.classList.add("card");

    // Determine file type
    let fileElement = "";
    if(data.answerFile){
      if(data.answerFile.endsWith(".pdf")){
        fileElement = `<iframe class="pdfThumb" src="${data.answerFile}" title="PDF" ></iframe>`;
      } else {
        fileElement = `<img class="clickableFile" src="${data.answerFile}">`;
      }
    }

    card.innerHTML = `
      <h3>Student: ${data.studentName}</h3>
      <p><b>Father Name:</b> ${data.fatherName}</p>
      <p><b>Subject:</b> ${data.subject}</p>
      <p><b>Submitted:</b> ${data.submittedAt}</p>
      <p><b>Answer File:</b></p>
      ${fileElement}
      <button class="deleteBtn">Delete Result</button>
    `;

    // Delete button
    const deleteBtn = card.querySelector(".deleteBtn");
    deleteBtn.addEventListener("click", () => {
      if(confirm("Are you sure you want to delete this result?")){
        remove(ref(db,"studentSubmissions/"+child.key));
      }
    });

    // Modal viewer
    const clickableFile = card.querySelector(".clickableFile, .pdfThumb");
    if(clickableFile){
      clickableFile.addEventListener("click", () => {
        viewerContent.innerHTML = "";
        if(data.answerFile.endsWith(".pdf")){
          viewerContent.innerHTML = `<iframe src="${data.answerFile}" style="width:100%; height:100%; border-radius:10px;"></iframe>`;
        } else {
          viewerContent.innerHTML = `<img src="${data.answerFile}">`;
        }
        viewerModal.style.display = "flex";
      });
    }

    container.appendChild(card);
  });

});

</script>

</body>
</html>
