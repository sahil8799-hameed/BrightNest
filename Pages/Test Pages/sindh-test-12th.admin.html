<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #eef2f7;
  color: #333;
}

/* HEADER */
header {
  background: linear-gradient(135deg, #e62f2f, #f30c0c);
  color: white;
  padding: 20px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h3 {
  margin: 0 0 8px;
  color: #4f46e5;
}

.card p {
  margin: 4px 0;
  font-size: 14px;
}

/* LINKS */
a {
  display: inline-block;
  margin-top: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* VIEW */
.view {
  color: #2563eb;
}

/* DOWNLOAD */
.download {
  color: green;
  margin-left: 10px;
}

/* IMAGE */
.card img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

/* DELETE */
button {
  margin-top: 12px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #ef4444;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #dc2626;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 50px;
  color: #666;
}

/* MODAL */
#fileModal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.modal-box {
  background: white;
  width: 90%;
  height: 90%;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.close-btn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: red;
  color: white;
  border: none;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
  z-index: 10;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>
</head>

<body>

<header>
12<sup>th</sup> Class 📊 Admin Panel - Student Submissions
</header>

<div class="container" id="container"></div>

<!-- MODAL -->
<div id="fileModal">
  <div class="modal-box">
    <button class="close-btn" onclick="closeModal()">Close</button>
    <iframe id="fileFrame"></iframe>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDIC_F-CicoOReHOS0_2E479xNO99oxuYY",
  authDomain: "brightnest-8f214.firebaseapp.com",
  databaseURL: "https://brightnest-8f214-default-rtdb.firebaseio.com",
  projectId: "brightnest-8f214",
  storageBucket: "brightnest-8f214.firebasestorage.app",
  messagingSenderId: "73934228297",
  appId: "1:73934228297:web:a36c6cb93407d38c376898"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const container = document.getElementById("container");
const CLASS_NAME = "sindh-12th";

const submissionsRef = ref(db, "studentSubmissions/" + CLASS_NAME);

/* OPEN FILE */
window.openFile = function(url) {
  document.getElementById("fileFrame").src = url;
  document.getElementById("fileModal").style.display = "flex";
};

/* CLOSE MODAL */
window.closeModal = function() {
  document.getElementById("fileModal").style.display = "none";
  document.getElementById("fileFrame").src = "";
};

/* DOWNLOAD FILE */
window.downloadFile = function(url, name) {

  fetch(url)
    .then(res => res.blob())
    .then(blob => {

      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);

      const ext = url.includes("pdf") ? ".pdf" : ".jpg";
      link.download = (name || "file") + ext;

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

    })
    .catch(() => alert("Download failed!"));

};

onValue(submissionsRef, (snapshot) => {

  container.innerHTML = "";

  if (!snapshot.exists()) {
    container.innerHTML = `<div class="empty">No submissions found 📭</div>`;
    return;
  }

  const items = [];

  snapshot.forEach(child => {
    items.push({ id: child.key, ...child.val() });
  });

  items.reverse();

  items.forEach(item => {

    const file = item.answerFile || "";

    const div = document.createElement("div");
    div.classList.add("card");

    div.innerHTML = `
      <h3>${item.studentName || "N/A"}</h3>
      <p><b>Father:</b> ${item.fatherName || "N/A"}</p>
      <p><b>Subject:</b> ${item.subject || "N/A"}</p>
      <p><b>Time:</b> ${item.submittedAt || "N/A"}</p>

      ${file ? `
        <a class="view" onclick="openFile('${file}')">📄 View File</a>
        <a class="download" onclick="downloadFile('${file}','${item.studentName || "file"}')">📥 Download</a>
      ` : ""}

      ${file.startsWith("data:image")
        ? `<img src="${file}" />`
        : ""}

      <button class="delete-btn" data-id="${item.id}">
        🗑 Delete Submission
      </button>
    `;

    container.appendChild(div);
  });

  document.querySelectorAll(".delete-btn").forEach(btn => {
    btn.onclick = () => {
      const id = btn.dataset.id;

      if (confirm("Are you sure you want to delete this submission?")) {
        remove(ref(db, "studentSubmissions/" + CLASS_NAME + "/" + id));
      }
    };
  });

});

</script>

</body>
</html>
