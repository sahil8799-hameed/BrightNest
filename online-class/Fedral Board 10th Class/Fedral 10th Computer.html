<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Class System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction: column;
gap: 5%;
}

.card{
background:white;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
text-align:center;
}

ul{
    display: flex;
    gap: 10%;
    font-weight: 600;
    flex-direction: column;
    font-style: italic;
}
.card h2{
margin-bottom:20px;
}

.input-box{
margin-bottom:15px;
}

.input-box input{
width:100%;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
outline:none;
}

.btn{
width:100%;
padding:12px;
border:none;
background:red;
color:white;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.btn:hover{
background:rgb(223, 8, 8);
}

.student-list{
margin-top:20px;
background:#f5f5f5;
padding:10px;
border-radius:6px;
display:none;
}

.student-list ul{
list-style:none;
}

.student-list li{
padding:6px;
border-bottom:1px solid #ddd;
}

#b-btn{
display: flex;
justify-content: center;
align-items: center;
width:100%;
margin-top:15px;
padding:10px;

border:none;
border-radius:10px;

background:red;

color:white;

cursor:pointer;

font-size:15px;

transform:scale(1);
}


#b-btn:hover{

background:rgb(185, 0, 0);

transform:scale(1.05);
transition: .6s;


}

</style>

</head>
<body>

</button></a>

<h3>How To Join Class</h3>
<ul>
    <li>Enter Your Subject Name</li>
    <li>Enter Class Zoom ID</li>
    <li>Enter Class Password</li>
</ul>


<div class="card">

<h2>Join Class</h2>

<div class="input-box">
<input type="text" id="name" placeholder="Enter Subject Name">
</div>

<div class="input-box">
<input type="text" id="zoom" placeholder="Enter Class Zoom ID">
</div>

<button class="btn" onclick="joinClass()">Join Class</button>

<div class="student-list" id="students">
<h3>Joined Students</h3>
<ul id="studentNames"></ul>
</div>

</div>

<script>

function joinClass(){

let studentName = document.getElementById("name").value
let zoomId = document.getElementById("zoom").value

if(studentName === "" || zoomId === ""){
alert("Please Fill All Fields")
return
}

// show list

document.getElementById("students").style.display = "block"

// create list item

let li = document.createElement("li")
li.textContent = studentName

document.getElementById("studentNames").appendChild(li)

// open zoom

window.open("https://zoom.us/j/" + zoomId , "_blank")

// clear input

document.getElementById("name").value = ""

}

</script>

</body>
</html>
